services:
  waha:
    image: devlikeapro/waha:latest
    container_name: automation-hub-waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WAHA_API_KEY: ${WAHA_API_KEY:-automation-hub-test-key}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME:-admin}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD:-change-me}
      WAHA_PRINT_QR: "true"
      WAHA_WEBHOOK_URL: ${WAHA_WEBHOOK_URL:-}
      WAHA_WEBHOOK_EVENTS: ${WAHA_WEBHOOK_EVENTS:-message,message.any,session.status}
    volumes:
      - waha-sessions:/app/.sessions
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  waha-sessions:
